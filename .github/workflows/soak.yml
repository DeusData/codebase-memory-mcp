# Real multi-hour soak — #581 query-only memory-leak reproducer.
#
# This is separate from _soak.yml/nightly-soak.yml. The default mixed workload
# periodically reindexes, which invokes memory collection and can hide a
# query-only leak. This workflow defaults to query-leak mode: one initial index,
# then read-only requests with no mutation, reindex, or crash-recovery pass.
#
# Non-gating: workflow_dispatch and qa/soak-** pushes only.
name: Soak (multi-hour #581)

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'Soak duration in minutes (default: 240 = 4h)'
        type: number
        default: 240
      mode:
        description: 'Soak mode (query-leak = #581 detector, no reindex/mutate)'
        type: choice
        options: ['default', 'query-leak']
        default: 'query-leak'
  push:
    branches: ['qa/soak-**']

permissions:
  contents: read

jobs:
  soak-unix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04-arm
            cc: gcc
            cxx: g++
          - os: macos-14
            cc: cc
            cxx: c++
          - os: macos-15-intel
            cc: cc
            cxx: c++
    runs-on: ${{ matrix.os }}
    # Literal budget also works on push events, where inputs is unavailable.
    timeout-minutes: 320
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install deps (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev python3 git

      - name: Build (prod binary)
        run: scripts/build.sh CC=${{ matrix.cc }} CXX=${{ matrix.cxx }}

      - name: Soak
        env:
          CBM_SOAK_MODE: ${{ inputs.mode || 'query-leak' }}
          DURATION_MINUTES: ${{ inputs.duration_minutes || '240' }}
        run: scripts/soak-test.sh build/c/codebase-memory-mcp "${DURATION_MINUTES}"

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soak-${{ matrix.os }}-${{ inputs.mode || 'query-leak' }}
          path: soak-results/
          retention-days: 14

  soak-windows:
    runs-on: windows-latest
    timeout-minutes: 320
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: CLANG64
          path-type: inherit
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-zlib
            mingw-w64-clang-x86_64-python3
            make
            git
            coreutils
      - name: Build (prod binary)
        shell: msys2 {0}
        run: scripts/build.sh CC=clang CXX=clang++
      - name: Soak
        shell: msys2 {0}
        env:
          CBM_SOAK_MODE: ${{ inputs.mode || 'query-leak' }}
          DURATION_MINUTES: ${{ inputs.duration_minutes || '240' }}
        run: |
          BIN=build/c/codebase-memory-mcp
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          scripts/soak-test.sh "$BIN" "${DURATION_MINUTES}"
      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soak-windows-${{ inputs.mode || 'query-leak' }}
          path: soak-results/
          retention-days: 14

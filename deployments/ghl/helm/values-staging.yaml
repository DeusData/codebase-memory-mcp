# values-staging.yaml — staging overrides
image:
  tag: "latest"

env:
  FLEET_CONCURRENCY: "2"
  INDEXER_CLIENTS: "2"
  INDEXER_CLIENT_MAX_USES: "20"
  GITHUB_AUTH_ENABLED: "true"
  GITHUB_ALLOWED_ORGS: "GoHighLevel"
  SCHEDULED_INDEXING_ENABLED: "true"
  CRON_INCREMENTAL: "0 3 * * *"

persistence:
  size: "10Gi"

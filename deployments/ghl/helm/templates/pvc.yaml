{{- if .Values.persistence.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "codebase-memory-mcp.fullname" . }}-cache
  labels:
    {{- include "codebase-memory-mcp.labels" . | nindent 4 }}
  annotations:
    # Retain the PVC even if the Helm release is deleted — the index is expensive to rebuild
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}

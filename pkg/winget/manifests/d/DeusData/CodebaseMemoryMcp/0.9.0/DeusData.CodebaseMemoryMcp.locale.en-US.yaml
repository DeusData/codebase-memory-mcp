ShortDescription: Fast code intelligence engine for AI coding agents
Description: |-
  codebase-memory-mcp is a single static binary MCP server that indexes codebases
  at extreme speed and exposes 15 MCP tools for AI coding agents. Full indexing
  of an average repository takes milliseconds, and the Linux kernel (28M LOC)
  takes about 3 minutes. Supports 159 languages via vendored tree-sitter
  grammars. Zero dependencies. One command configures 43 automatic or
  conditional client surfaces.
